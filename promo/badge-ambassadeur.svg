<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>

  <!-- Ruban haut -->
  <polygon points="150,10 170,60 130,60" fill="url(#ribbon)"/>

  <!-- Cercle médaille -->
  <circle cx="150" cy="150" r="90" fill="url(#gold)"/>
  <circle cx="150" cy="150" r="83" fill="none" stroke="#fef3c7" stroke-width="2"/>

  <!-- Étoile -->
  <polygon points="150,80 165,120 200,120 172,145 182,185 150,162 118,185 128,145 100,120 135,120" fill="white"/>

  <!-- Texte -->
  <text x="150" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Ambassadeur</text>
  <text x="150" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Kaoutal</text>

  <!-- Ruban bas -->
  <rect x="120" y="250" width="60" height="15" rx="3" fill="url(#ribbon)"/>
  <text x="150" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">N°001</text>
</svg>
