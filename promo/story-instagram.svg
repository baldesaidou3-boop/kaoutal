<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Décorations -->
  <circle cx="540" cy="200" r="300" fill="rgba(255,255,255,0.03)"/>

  <!-- Logo -->
  <text x="540" y="320" text-anchor="middle" font-size="120">🛍️</text>

  <!-- Titre -->
  <text x="540" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white">Kaoutal</text>
  <text x="540" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#a7f3d0">🇬🇳 Marketplace Guinéenne 🇬🇳</text>

  <!-- Séparateur -->
  <line x1="300" y1="580" x2="780" y2="580" stroke="#34d399" stroke-width="3"/>

  <!-- Sous-titre -->
  <text x="540" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">Tu veux vendre en ligne ?</text>

  <!-- Liste verticale -->
  <rect x="240" y="730" width="600" height="70" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="270" y="775" font-family="Arial, sans-serif" font-size="24" fill="white">🚀  Boutique gratuite</text>

  <rect x="240" y="820" width="600" height="70" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="270" y="865" font-family="Arial, sans-serif" font-size="24" fill="white">📱  Paiement Mobile Money</text>

  <rect x="240" y="910" width="600" height="70" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="270" y="955" font-family="Arial, sans-serif" font-size="24" fill="white">🏅  Badge ambassadeur</text>

  <rect x="240" y="1000" width="600" height="70" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="270" y="1045" font-family="Arial, sans-serif" font-size="24" fill="white">🇬🇳  Fièrement guinéen</text>

  <!-- Bouton CTA -->
  <rect x="240" y="1140" width="600" height="70" rx="35" fill="url(#btn)"/>
  <text x="540" y="1186" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#92400e">👉  Je crée ma boutique</text>

  <!-- URL -->
  <text x="540" y="1260" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">kaoutal.vercel.app</text>

  <!-- "Glisser vers le haut" -->
  <rect x="420" y="1350" width="240" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
  <text x="540" y="1376" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">⬆  Glisser vers le haut</text>

  <!-- Pied de page -->
  <text x="540" y="1500" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.3)">Kaoutal - Tous droits réservés</text>
</svg>
